name: Build NexiliumOS ISO

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
      options: --privileged
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install live-build dependencies
        run: |
          apt update
          apt install -y live-build debootstrap squashfs-tools xorriso isolinux syslinux-common syslinux-utils debian-archive-keyring

      - name: Ensure hooks are executable
        run: chmod +x nexiliumos/config/hooks/normal/*.hook.chroot

      - name: Configure live-build
        run: |
          cd nexiliumos
          lb config --distribution trixie --architecture amd64

      - name: Build ISO
        run: |
          cd nexiliumos
          lb build

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexiliumos-iso
          path: nexiliumos/*.iso
