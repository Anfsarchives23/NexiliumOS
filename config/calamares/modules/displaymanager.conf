---
# Fixa o GDM como gerenciador de login, não importa qual desktop o usuário
# escolher no seletor online (todos eles vêm com seu próprio *dm por
# dependência, ex: lightdm no XFCE/MATE — isso aqui garante que o GDM
# continua sendo o padrão configurado no sistema final).
displaymanagers:
    - gdm3

basicSetup: true
sysconfigSetup: false

